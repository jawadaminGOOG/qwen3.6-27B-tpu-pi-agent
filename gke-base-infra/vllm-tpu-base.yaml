apiVersion: v1
kind: Namespace
metadata:
  name: vllm-serving
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: hyperdisk-balanced-vllm
provisioner: pd.csi.storage.gke.io
parameters:
  type: hyperdisk-balanced
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-cache
  namespace: vllm-serving
spec:
  storageClassName: hyperdisk-balanced-vllm
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-tpu-serving
  namespace: vllm-serving
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-tpu-serving
  template:
    metadata:
      labels:
        app: vllm-tpu-serving
    spec:
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
        cloud.google.com/gke-tpu-topology: 2x2
      containers:
        - name: vllm-tpu
          image: vllm/vllm-tpu:latest
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --host=0.0.0.0
            - --port=8000
            - --model=Qwen/Qwen3.6-27B-FP8
            - --tensor-parallel-size=4
            - --max-model-len=4096
            - --gpu-memory-utilization=0.90
            - --max-num-seqs=16
            - --language-model-only
            - --limit-mm-per-prompt
            - '{"image": 0, "video": 0}'
          env:
            - name: VLLM_USE_V1
              value: "1"
            - name: HF_HOME
              value: /data
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: hf_api_token
                  optional: true
          ports:
            - containerPort: 8000
          resources:
            limits:
              google.com/tpu: "4"
            requests:
              google.com/tpu: "4"
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
          volumeMounts:
            - mountPath: "/data"
              name: data-volume
            - mountPath: /dev/shm
              name: dshm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
        - name: data-volume
          persistentVolumeClaim:
            claimName: vllm-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-tpu-service
  namespace: vllm-serving
spec:
  selector:
    app: vllm-tpu-serving
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
